apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-green-app
  namespace: prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: python-green-app
  template:
    metadata:
      labels:
        app: python-green-app
    spec:
      containers:
        - name: flask-app
          image: itsverysimple/python-bg-live:3.0
          ports:
            - containerPort: 5000
          env:
            - name: ENVIRONMENT
              value: "green"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
