apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-blue-app
  namespace: dev
spec:
  replicas: 3
  selector:
    matchLabels:
      app: python-blue-app
  template:
    metadata:
      labels:
        app: python-blue-app
    spec:
      containers:
      - name: flask-app
        image: itsverysimple/python-bg-live:v1
        ports:
        - containerPort: 5000
        env:
        - name: APP_ENV
          value: "blue"
        - name: APP_VERSION
          value: "v1"
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
