apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multi-region-ingress
  namespace: region-a
spec:
  rules:
  - host: multi-region.local
    http:
      paths:
      - path: /region-a
        pathType: Prefix
        backend:
          service:
            name: nginx-service-v1
            port:
              number: 80
      - path: /region-b
        pathType: Prefix
        backend:
          service:
            name: nginx-service-v2
            port:
              number: 80