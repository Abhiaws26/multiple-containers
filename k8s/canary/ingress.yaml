
# Ingress routing (pseudo-example)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ab-test
  namespace: dev
spec:
  rules:
  - host: abtest.local
    http:
      paths:
      - path: /a
        pathType: Prefix
        backend:
          service:
            name: nginx-a
            port:
              number: 80
      - path: /b
        pathType: Prefix
        backend:
          service:
            name: nginx-b
            port:
              number: 80
