# Version B
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-b
  namespace: dev
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
      variant: b
  template:
    metadata:
      labels:
        app: nginx
        variant: b
    spec:
      containers:
      - name: nginx
        image: nginx:1.22
---