apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app
  namespace: prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: python-app
  template:
    metadata:
      labels:
        app: python-app
    spec:
      containers:
      - name: python-flask-app
        image: itsverysimple/flask-k8s:latest
        ports:
        - containerPort: 5000