apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: python-flask-ingress
  namespace: prod
spec:
  rules:
  - host: python-app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: python-service
            port:
              number: 80
              